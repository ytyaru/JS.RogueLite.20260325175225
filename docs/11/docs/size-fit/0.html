<!DOCTYPE html>
<head>
<meta charset="utf-8">
<style>
:root {
  --width: 300px;
  --line-of-chars: 40;
}
.ja {
  line-height: 1.5em;
  letter-spacing: 0.05em;
}
.container {
  width: var(--width); /* 指定したい幅 */
  height: 200px; /* 指定したい高さ */
  border: 2px solid #333;
  
  /* 中央配置 */
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden; /* はみ出し防止 */
}
.content {
  /* 最大サイズ設定（縦横比維持） */
  max-width: 100%;
  max-height: 100%;
  
  /* 画像の場合、縦横比を保って中央にフィット */
  object-fit: contain; 

  /*font-size: clamp(16px, 40vw, 32px); */
  font-size: clamp(16px, calc(var(--width) / var(--line-of-chars)), 96px); 
}
</style>
</head>
<body>
<div class="container ja">
<div class="content">
あああああああああああああああああああああああああ
</div>
</div>
</body>
