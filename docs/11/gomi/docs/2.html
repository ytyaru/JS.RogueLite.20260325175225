<!DOCTYPE html>
<html>
<head>
<style>
  /* 240x320の檻。余計なものをすべて削ぎ落としたゴミ */
  #game {
    width: 240px;
    height: 320px;
    border: 1px solid #000;
    display: grid;
    /* ヘッダー(30), ライフ(40), ボタン(60), 隙間(4), 説明(残り) */
    grid-template-rows: 20px 40px 60px 4px 1fr;
    font-family: monospace;
    box-sizing: border-box;
    background: #fff;
    color: #000;
  }

  /* ヘッダー：名前とターン */
  #header {
    display: grid;
    grid-template-columns: 1fr 40px 1fr;
    text-align: center;
    align-items: center;
    font-size: 16px;
  }

  /* ライフ：28pxの巨大表示 */
  #status {
    display: grid;
    grid-template-columns: 1fr 1fr;
    text-align: center;
    align-items: center;
    font-size: 28px;
    font-weight: bold;
  }

  /* 札ボタン：名前と状態のみ。16px、余白ゼロ */
  #actions {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0;
  }
  button {
    height: 60px; /* 48px以上を保証 */
    font-size: 16px;
    padding: 0;
    border: 1px solid #000;
    background: #eee;
    cursor: pointer;
  }
  button:focus {
    background: #fff;
    outline: 2px solid #000;
  }

  /* 4pxの隙間（gridの4行目が担当） */

  /* 詳細説明：16px、読みやすさ重視の設定 */
  #detail {
    font-size: 16px;
    line-height: 1.5;
    letter-spacing: 0.05em;
    background: #fff;
    overflow-wrap: break-word;
  }
</style>
</head>
<body>

<div id="game">
  <div id="header">
    <span>英雄</span>
    <span id="turn">1</span>
    <span>外敵</span>
  </div>

  <div id="status">
    <span id="hero-hp">10/10</span>
    <span id="enemy-hp">10/10</span>
  </div>

  <div id="actions">
    <!-- 名前と状態のみ。要約は廃止ゴミ -->
    <button>斬る+1</button>
    <button>突貫</button>
    <button>自然治癒</button>
  </div>

  <!-- 隙間用の空div -->
  <div></div>

  <div id="detail">
    相手の生命点と身体点は1減る。[連斬]続けてこの札を選択した場合、身体点の減量は1増す。但し最大3まで。連続選択が途絶えると増量は0に戻る。１２３４５６７８９０１２３４５６７８９０１２３４５６７８９０１２３４５６７８９０１２３４５６７８９０１２３４５６７８９０１２３４５６７８９０１２３４５６７８９０１２３４５６７８９０
  </div>
</div>

</body>
</html>
