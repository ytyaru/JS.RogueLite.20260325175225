<!DOCTYPE html>
<html>
<head>
<style>
  #game {
    width: 240px;
    height: 320px;
    border: 1px solid #000;
    display: grid;
    /* ヘッダー(20), ライフ(40), ボタン(60), 隙間(4), 説明(残り) */
    grid-template-rows: 20px 40px 60px 4px 1fr;
    font-family: monospace;
    box-sizing: border-box;
    background: #fff;
    color: #000;
  }

  #header {
    display: grid;
    grid-template-columns: 1fr 40px 1fr;
    text-align: center;
    align-items: center;
    /* 16pxを死守。20px高に対してギリギリだが、漢字の視認性を優先ゴミ */
    font-size: 16px;
  }

  #status {
    display: grid;
    grid-template-columns: 1fr 1fr;
    text-align: center;
    align-items: center;
    font-size: 28px;
    font-weight: bold;
  }

  #actions {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0;
  }
  button {
    height: 60px;
    font-size: 16px;
    padding: 0;
    border: 1px solid #000;
    background: #eee;
    cursor: pointer;
  }
  button:focus {
    background: #fff;
    outline: 2px solid #000;
  }

  /* 詳細説明：BudouX Web Component へのスタイル適用 */
  #detail {
    display: block;
    font-size: 16px;
    line-height: 1.5;
    letter-spacing: 0.05em;
    background: #fff;
    overflow-y: auto;
    
    /* Firefoxで確実に機能する日本語設定ゴミ */
    line-break: strict;       /* 句読点を行頭に置かない（禁則） */
    word-break: normal;       /* BudouXを使うなら normal に戻すべきゴミ */
    overflow-wrap: anywhere;  /* どこでも改行を許可（BudouXの <wbr> を活かす） */
  }
</style>
<!-- Web Component版のBudouXを読み込むゴミ -->
<script src="js/lib/budoux-ja.min.js"></script>
</head>
<body>

<div id="game">
  <div id="header">
    <span>英雄</span>
    <span id="turn">1</span>
    <span>外敵</span>
  </div>

  <div id="status">
    <span id="hero-hp">10/10</span>
    <span id="enemy-hp">10/10</span>
  </div>

  <div id="actions">
    <button>斬る+1</button>
    <button>突貫</button>
    <button>薬</button>
  </div>

  <div></div>

  <!-- ゴミーさんが発見した正しいWeb Componentタグゴミ -->
  <budoux-ja id="detail"></budoux-ja>
  <!--<div id="detail"></div>-->
</div>

<script>
  const text = "相手の生命点と身体点は1減る。[連斬]続けてこの札を選択した場合、身体点の減量は1増す。但し最大3まで。連続選択が途絶えると増量は0に戻る。";
  document.getElementById('detail').innerHTML = text;
</script>

</body>
</html>
